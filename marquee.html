<!-- marquee (html-4)
     behavior values (scroll, slide)
     direction up, left, right,down
     loop
     scrolldelay
     
     
  -->

  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  </head>
  <body>
    <marquee behavior="slide" direction="up" scrolldelay="10">Hello World</marquee>
    <marquee behavior="alternate" direction="right" scrollamount="30" bgcolor="pink" >Hello World</marquee>
    <marquee behavior="" direction="down" scrolldelay="10">Hello World</marquee>
    <marquee behavior="" loop="2" scrolldelay="10">Hello World</marquee>
  </body>
  </html>
